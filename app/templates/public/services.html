{% extends "base.html" %}

{% block title %}Services & Tech Stack | {{ settings.name }}{% endblock %}

{% block content %}
<section class="space-y-16">
    <div class="text-center space-y-4">
        <h1 class="text-4xl font-bold text-white">Technical Arsenal</h1>
        <p class="text-gray-400">The tools and technologies I use to build scalable production systems.</p>
    </div>

    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
        
        <!-- Backend -->
        <div class="p-6 rounded-2xl border border-gray-800 bg-card">
            <h3 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
                <span class="text-brand">#</span> Backend
            </h3>
            <div class="space-y-4 flex flex-col items-start">
                <img src="https://img.shields.io/badge/PHP-777BB4?style=for-the-badge&logo=php&logoColor=white">
                <img src="https://img.shields.io/badge/Laravel-FF2D20?style=for-the-badge&logo=laravel&logoColor=white">
                <img src="https://img.shields.io/badge/Node.js-339933?style=for-the-badge&logo=nodedotjs&logoColor=white">
                <img src="https://img.shields.io/badge/Express.js-000000?style=for-the-badge&logo=express&logoColor=white">
                <img src="https://img.shields.io/badge/Python-3776AB?style=for-the-badge&logo=python&logoColor=white">
                <img src="https://img.shields.io/badge/Flask-000000?style=for-the-badge&logo=flask&logoColor=white">
            </div>
        </div>

        <!-- Frontend -->
        <div class="p-6 rounded-2xl border border-gray-800 bg-card">
            <h3 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
                <span class="text-brand">#</span> Frontend
            </h3>
            <div class="space-y-4 flex flex-col items-start">
                <img src="https://img.shields.io/badge/React.js-20232A?style=for-the-badge&logo=react&logoColor=61DAFB">
                <img src="https://img.shields.io/badge/Next.js-000000?style=for-the-badge&logo=nextdotjs&logoColor=white">
                <img src="https://img.shields.io/badge/Tailwind_CSS-06B6D4?style=for-the-badge&logo=tailwindcss&logoColor=white">
                <img src="https://img.shields.io/badge/Alpine.js-8BC0D0?style=for-the-badge&logo=alpinedotjs&logoColor=black">
                <img src="https://img.shields.io/badge/JavaScript-F7DF1E?style=for-the-badge&logo=javascript&logoColor=black">
            </div>
        </div>

        <!-- AI & DB -->
        <div class="p-6 rounded-2xl border border-gray-800 bg-card space-y-8">
            <div>
                <h3 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
                    <span class="text-brand">#</span> AI & Automation
                </h3>
                <div class="space-y-4 flex flex-col items-start">
                    <img src="https://img.shields.io/badge/OpenAI_API-412991?style=for-the-badge&logo=openai&logoColor=white">
                    <img src="https://img.shields.io/badge/n8n-EA4B71?style=for-the-badge&logo=n8n&logoColor=white">
                    <img src="https://img.shields.io/badge/Make.com-6D00CC?style=for-the-badge&logo=make&logoColor=white">
                </div>
            </div>
            <div>
                <h3 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
                    <span class="text-brand">#</span> Database
                </h3>
                <div class="space-y-4 flex flex-col items-start">
                    <img src="https://img.shields.io/badge/MySQL-4479A1?style=for-the-badge&logo=mysql&logoColor=white">
                    <img src="https://img.shields.io/badge/PostgreSQL-316192?style=for-the-badge&logo=postgresql&logoColor=white">
                    <img src="https://img.shields.io/badge/MongoDB-4EA94B?style=for-the-badge&logo=mongodb&logoColor=white">
                </div>
            </div>
        </div>

    </div>
</section>
{% endblock %}
