{% extends "admin/admin_base.html" %}

{% block header_title %}Dashboard Overview{% endblock %}

{% block content %}
<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <!-- Stat Card 1 -->
    <div class="p-6 rounded-2xl bg-card border border-gray-800 flex items-center gap-4">
        <div class="w-12 h-12 rounded-xl bg-brand/10 text-brand flex items-center justify-center">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
        </div>
        <div>
            <p class="text-sm text-gray-400 font-medium">Total Projects</p>
            <p class="text-2xl font-bold text-white">{{ projects|length }}</p>
        </div>
    </div>
    
    <!-- Stat Card 2 -->
    <div class="p-6 rounded-2xl bg-card border border-gray-800 flex items-center gap-4">
        <div class="w-12 h-12 rounded-xl bg-blue-500/10 text-blue-400 flex items-center justify-center">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
        </div>
        <div>
            <p class="text-sm text-gray-400 font-medium">Services Offered</p>
            <p class="text-2xl font-bold text-white">{{ services|length }}</p>
        </div>
    </div>
</div>

<!-- Quick Actions -->
<div class="mt-8 p-6 rounded-2xl bg-card border border-gray-800">
    <h3 class="text-lg font-bold text-white mb-6">Quick Actions</h3>
    <div class="flex gap-4 flex-wrap">
        <a href="{{ url_for('admin.projects_create') }}" class="px-6 py-3 rounded-lg bg-brand text-white font-medium hover:bg-brand/90 transition-colors flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            Add New Project
        </a>
        <a href="{{ url_for('admin.services_create') }}" class="px-6 py-3 rounded-lg bg-blue-500/10 text-blue-400 font-medium hover:bg-blue-500/20 transition-colors flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            Add New Service
        </a>
        <a href="{{ url_for('admin.settings_form') }}" class="px-6 py-3 rounded-lg border border-gray-700 text-white font-medium hover:bg-gray-800 transition-colors flex items-center gap-2">
            Edit Profile Settings
        </a>
    </div>
</div>
{% endblock %}
