{% extends "admin/admin_base.html" %}

{% block header_title %}{{ 'Edit Project' if project else 'Create New Project' }}{% endblock %}

{% block content %}
<div class="mb-6 flex items-center">
    <a href="{{ url_for('admin.projects_index') }}" class="text-sm text-gray-400 hover:text-white flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        Back to Projects
    </a>
</div>

<form method="POST" action="{{ url_for('admin.projects_edit', id=project.id) if project else url_for('admin.projects_create') }}" class="bg-card border border-gray-800 rounded-2xl p-8 space-y-6">
    <div class="grid md:grid-cols-2 gap-6">
        <div class="space-y-2 md:col-span-2">
            <label class="text-sm font-medium text-gray-300">Project Title *</label>
            <input type="text" name="title" required value="{{ project.title if project else '' }}" class="w-full bg-[#0d1117] border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-brand">
        </div>
        
        <div class="space-y-2 md:col-span-2">
            <label class="text-sm font-medium text-gray-300">Description *</label>
            <textarea name="description" required rows="4" class="w-full bg-[#0d1117] border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-brand">{{ project.description if project else '' }}</textarea>
        </div>

        <div class="space-y-2">
            <label class="text-sm font-medium text-gray-300">Tech Stack * <span class="text-xs text-gray-500">(Comma separated)</span></label>
            <input type="text" name="stack" required value="{{ project.stack if project else '' }}" placeholder="e.g. Flask, Python, Tailwind" class="w-full bg-[#0d1117] border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-brand">
        </div>
        
        <div class="space-y-2">
            <label class="text-sm font-medium text-gray-300">Live URL <span class="text-xs text-gray-500">(Optional)</span></label>
            <input type="url" name="live_url" value="{{ project.live_url if project else '' }}" placeholder="https://..." class="w-full bg-[#0d1117] border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-brand">
        </div>
        
        <div class="space-y-2">
            <label class="text-sm font-medium text-gray-300">Display Order</label>
            <input type="number" name="order" value="{{ project.order if project else '0' }}" class="w-full bg-[#0d1117] border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-brand">
        </div>
    </div>
    
    <div class="pt-6 border-t border-gray-800 flex justify-end">
        <button type="submit" class="px-8 py-3 rounded-lg bg-brand text-white font-bold hover:bg-brand/90 transition-colors">
            {{ 'Update Project' if project else 'Create Project' }}
        </button>
    </div>
</form>
{% endblock %}
