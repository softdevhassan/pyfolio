{% extends "admin/admin_base.html" %}

{% block header_title %}{{ 'Edit Service' if service else 'Create New Service' }}{% endblock %}

{% block content %}
<div class="mb-6 flex items-center">
    <a href="{{ url_for('admin.services_index') }}" class="text-sm text-gray-400 hover:text-white flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        Back to Services
    </a>
</div>

<form method="POST" action="{{ url_for('admin.services_edit', id=service.id) if service else url_for('admin.services_create') }}" class="bg-card border border-gray-800 rounded-2xl p-8 space-y-6 max-w-2xl">
    <div class="grid gap-6">
        <div class="space-y-2">
            <label class="text-sm font-medium text-gray-300">Service Name *</label>
            <input type="text" name="name" required value="{{ service.name if service else '' }}" placeholder="e.g. Frontend Development" class="w-full bg-[#0d1117] border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-brand">
        </div>
        
        <div class="space-y-2">
            <label class="text-sm font-medium text-gray-300">Display Order</label>
            <input type="number" name="order" value="{{ service.order if service else '0' }}" class="w-full bg-[#0d1117] border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-brand">
        </div>
    </div>
    
    <div class="pt-6 border-t border-gray-800 flex justify-end">
        <button type="submit" class="px-8 py-3 rounded-lg bg-brand text-white font-bold hover:bg-brand/90 transition-colors">
            {{ 'Update Service' if service else 'Create Service' }}
        </button>
    </div>
</form>
{% endblock %}
